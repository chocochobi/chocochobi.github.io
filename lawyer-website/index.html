<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>準備中 | 沼澤法律事務所</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #0e1c30 0%, #1a2e4a 45%, #243a5e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      line-height: 1.9;
    }
    .soon { max-width: 540px; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .logo-mark {
      background: #b8965a;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.08em; }
    .soon-mark {
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #d4b07a;
      font-weight: 700;
    }
    .soon h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      margin: 16px 0 18px;
      letter-spacing: 0.04em;
    }
    .soon p { color: rgba(255,255,255,0.72); font-size: 15px; }
    .soon a {
      display: inline-block;
      margin-top: 32px;
      color: #d4b07a;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
    }
    .soon a:hover { color: #e3c692; }
  </style>
</head>
<body>
  <main class="soon">
    <span class="logo">
      <span class="logo-mark">沼澤</span>
      <span class="logo-text">法律事務所</span>
    </span>
    <div>
      <span class="soon-mark">Coming Soon</span>
      <h1>ただいま準備中です</h1>
      <p>沼澤法律事務所のウェブサイトは現在準備を進めております。<br>公開までもうしばらくお待ちください。</p>
      <a href="../">← サイト一覧へ戻る</a>
    </div>
  </main>
</body>
</html>
