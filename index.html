<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chocochobi.site</title>
  <meta name="description" content="chocochobi.site のサイト一覧です。">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      color: #2d3142;
      background: linear-gradient(160deg, #f5f3ef 0%, #eae6df 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      line-height: 1.7;
    }
    .hub {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }
    .hub-mark {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #a08e6a;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .hub h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #2d3142;
    }
    .hub-lead {
      color: #6c7080;
      font-size: 15px;
      margin-top: 14px;
      margin-bottom: 48px;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 200px;
      padding: 28px;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,0.07);
      text-align: left;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.12);
    }
    .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 6px; }
    .card.law .card-accent  { background: linear-gradient(90deg, #1a2e4a, #b8965a); }
    .card.barre .card-accent { background: linear-gradient(90deg, #c98aa6, #e8c9a0); }
    .card-tag {
      align-self: flex-start;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a08e6a;
      font-weight: 700;
      margin-bottom: auto;
    }
    .card h2 {
      font-size: 21px;
      font-weight: 700;
      margin-top: 18px;
      color: #2d3142;
    }
    .card p { font-size: 13.5px; color: #6c7080; margin-top: 8px; }
    .card-go { margin-top: 16px; font-size: 13px; font-weight: 700; color: #b8965a; }
    .badge-soon {
      position: absolute;
      top: 18px; right: 18px;
      background: #efe9e0;
      color: #a08e6a;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .hub-footer { margin-top: 44px; font-size: 12px; color: #9a9eac; letter-spacing: 0.05em; }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="hub">
    <span class="hub-mark">chocochobi.site</span>
    <h1>サイト一覧</h1>
    <p class="hub-lead">ご覧になりたいサイトをお選びください。</p>

    <div class="cards">
      <a class="card law" href="lawyer-website/">
        <span class="card-accent"></span>
        <span class="card-tag">Law Office</span>
        <h2>沼澤法律事務所</h2>
        <p>誠実・迅速・確実。沼津で個人・法人の法的問題のご相談を承ります。</p>
        <span class="card-go">サイトを見る →</span>
      </a>

      <a class="card barre" href="barreton/">
        <span class="card-accent"></span>
        <span class="badge-soon">準備中</span>
        <span class="card-tag">Studio</span>
        <h2>バレトン教室</h2>
        <p>ただいまサイトを準備中です。公開までもうしばらくお待ちください。</p>
        <span class="card-go">準備中ページへ →</span>
      </a>
    </div>

    <p class="hub-footer">&copy; 2026 chocochobi.site</p>
  </main>
</body>
</html>
